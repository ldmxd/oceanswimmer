<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create Account – OceanSwimmer</title>
    <meta name="description" content="Create an OceanSwimmer account to claim your swim results and see your athlete profile." />

    <!-- Open Graph -->
    <meta property="og:title" content="Register – OceanSwimmer" />
    <meta property="og:description" content="Create an OceanSwimmer account to claim your swim results and see your athlete profile." />
    <meta property="og:image" content="https://oceanswimmer.com.au/images/og-image.png" />
    <meta property="og:url" content="https://oceanswimmer.com.au/register.html" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="https://oceanswimmer.com.au/register.html" />
    <link rel="icon" href="/images/favicon.ico" />
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f3f4f6;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.10);
            padding: 2rem 2.2rem;
            width: 100%;
            max-width: 380px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: inherit;
            margin-bottom: 1.6rem;
        }

        .logo span { font-size: 1.2rem; font-weight: 600; }

        h2 { margin: 0 0 1.4rem; font-size: 1.25rem; color: #222; }

        label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 4px;
            margin-top: 12px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s;
        }

        input:focus { border-color: #0066cc; }

        .hint {
            font-size: 12px;
            color: #999;
            margin-top: 3px;
        }

        .btn-primary {
            display: block;
            width: 100%;
            padding: 10px;
            background: #0066cc;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 18px;
            transition: background 0.15s;
        }

        .btn-primary:hover { background: #0052a3; }
        .btn-primary:disabled { opacity: 0.6; cursor: default; }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
            color: #aaa;
            font-size: 13px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-top: 1px solid #e5e7eb;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #dadce0;
            border-radius: 6px;
            background: #fff;
            font-size: 14px;
            font-weight: 500;
            color: #3c4043;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s;
            margin-bottom: 10px;
        }

        .btn-social:hover { background: #f8f9fa; }

        .btn-facebook {
            background: #1877f2;
            color: #fff;
            border-color: #1877f2;
        }

        .btn-facebook:hover { background: #166fe5; }

        .msg {
            font-size: 13px;
            padding: 9px 12px;
            border-radius: 6px;
            margin-bottom: 14px;
            display: none;
        }

        .msg.error   { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
        .msg.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }

        .footer-links {
            text-align: center;
            margin-top: 18px;
            font-size: 13px;
            color: #666;
        }

        .footer-links a { color: #0066cc; }
    </style>
</head>
<body>

<div class="card">
    <a href="/" class="logo">
        <img src="/images/favicon-32x32.png" alt="" style="width:28px;height:28px;" />
        <span>OceanSwimmer</span>
    </a>

    <h2>Create account</h2>

    <div id="msg" class="msg"></div>

    <div id="formWrap">
        <!-- Quick social sign-up -->
        <a href="/login/google" class="btn-social">
            <svg width="18" height="18" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Sign up with Google
        </a>

        <a href="/login/facebook" class="btn-social btn-facebook">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff">
                <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.886v2.267h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
            </svg>
            Sign up with Facebook
        </a>

        <div class="divider">or register with email</div>

        <form id="registerForm" onsubmit="handleRegister(event)">
            <label for="email">Email address</label>
            <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="new-password" />
            <div class="hint">Minimum 8 characters</div>

            <label for="password2">Confirm password</label>
            <input type="password" id="password2" placeholder="••••••••" required autocomplete="new-password" />

            <label for="notifyUnclaimedResults" style="display: flex; align-items: flex-start; gap: 8px; margin-top: 18px; font-size: 13px; color: #555; line-height: 1.4; cursor: pointer;">
                <input type="checkbox" id="notifyUnclaimedResults" style="margin-top: 2px; flex-shrink: 0;" />
                <span>
                    Email me when new race results might be mine to claim.
                    <span class="hint" style="display: block; margin-top: 2px;">Unsubscribe any time. You can change this in your account later.</span>
                </span>
            </label>

            <button type="submit" class="btn-primary" id="registerBtn">Create account</button>
        </form>
    </div>

    <div class="footer-links">
        Already have an account? <a href="/login.html">Sign in</a>
    </div>
</div>

<script>
    async function handleRegister(e) {
        e.preventDefault();
        const btn = document.getElementById('registerBtn');
        clearMsg();

        const email  = document.getElementById('email').value.trim();
        const pass1  = document.getElementById('password').value;
        const pass2  = document.getElementById('password2').value;
        const notifyUnclaimedResults = document.getElementById('notifyUnclaimedResults').checked;

        if (pass1 !== pass2) {
            showMsg('Passwords do not match.', 'error');
            return;
        }

        btn.disabled    = true;
        btn.textContent = 'Creating account…';

        try {
            const res  = await fetch('/auth/register', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ email, password: pass1, notifyUnclaimedResults })
            });

            const data = await res.json();

            if (res.ok) {
                document.getElementById('formWrap').style.display = 'none';
                showMsg(data.message, 'success');
            } else {
                showMsg(data.error || 'Registration failed.', 'error');
            }
        } catch {
            showMsg('Something went wrong. Please try again.', 'error');
        } finally {
            btn.disabled    = false;
            btn.textContent = 'Create account';
        }
    }

    function showMsg(text, type) {
        const el = document.getElementById('msg');
        el.textContent = text;
        el.className = `msg ${type}`;
        el.style.display = 'block';
    }

    function clearMsg() {
        document.getElementById('msg').style.display = 'none';
    }
</script>
</body>
</html>
