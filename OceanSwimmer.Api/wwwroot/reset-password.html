<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Reset Password – OceanSwimmer</title>
    <link rel="icon" href="/favicon.ico" />
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f3f4f6;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.10);
            padding: 2rem 2.2rem;
            width: 100%;
            max-width: 380px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: inherit;
            margin-bottom: 1.6rem;
        }

        .logo span { font-size: 1.2rem; font-weight: 600; }

        h2 { margin: 0 0 1.4rem; font-size: 1.25rem; color: #222; }

        label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 4px;
            margin-top: 12px;
        }

        input[type="password"] {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s;
        }

        input:focus { border-color: #0066cc; }

        .btn-primary {
            display: block;
            width: 100%;
            padding: 10px;
            background: #0066cc;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 18px;
            transition: background 0.15s;
        }

        .btn-primary:hover { background: #0052a3; }
        .btn-primary:disabled { opacity: 0.6; cursor: default; }

        .msg {
            font-size: 13px;
            padding: 9px 12px;
            border-radius: 6px;
            margin-bottom: 14px;
            display: none;
        }

        .msg.error   { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
        .msg.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }

        .footer-links {
            text-align: center;
            margin-top: 18px;
            font-size: 13px;
            color: #666;
        }

        .footer-links a { color: #0066cc; }
    </style>
</head>
<body>

<div class="card">
    <a href="/" class="logo">
        <img src="/favicon-32x32.png" alt="" style="width:28px;height:28px;" />
        <span>OceanSwimmer</span>
    </a>

    <h2>Set a new password</h2>

    <div id="msg" class="msg"></div>

    <form id="resetForm" onsubmit="handleReset(event)">
        <label for="password">New password</label>
        <input type="password" id="password" placeholder="At least 8 characters" required autocomplete="new-password" minlength="8" />

        <label for="confirm">Confirm new password</label>
        <input type="password" id="confirm" placeholder="Repeat your new password" required autocomplete="new-password" />

        <button type="submit" class="btn-primary" id="submitBtn">Set new password</button>
    </form>

    <div class="footer-links">
        <a href="/login.html">Back to sign in</a>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');

    if (!token) {
        showMsg('Invalid or missing reset token. Please request a new reset link.', 'error');
        document.getElementById('resetForm').style.display = 'none';
    }

    async function handleReset(e) {
        e.preventDefault();
        const btn      = document.getElementById('submitBtn');
        const password = document.getElementById('password').value;
        const confirm  = document.getElementById('confirm').value;

        if (password !== confirm) {
            showMsg('Passwords do not match.', 'error');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Saving…';
        clearMsg();

        try {
            const res = await fetch('/auth/reset-password', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ token, newPassword: password })
            });

            const data = await res.json();

            if (res.ok) {
                showMsg(data.message, 'success');
                document.getElementById('resetForm').style.display = 'none';
                setTimeout(() => window.location.href = '/login.html', 2500);
            } else {
                showMsg(data.error || 'Something went wrong. Please try again.', 'error');
                btn.disabled = false;
                btn.textContent = 'Set new password';
            }
        } catch {
            showMsg('Something went wrong. Please try again.', 'error');
            btn.disabled = false;
            btn.textContent = 'Set new password';
        }
    }

    function showMsg(text, type) {
        const el = document.getElementById('msg');
        el.textContent = text;
        el.className = `msg ${type}`;
        el.style.display = 'block';
    }

    function clearMsg() {
        const el = document.getElementById('msg');
        el.style.display = 'none';
    }
</script>
</body>
</html>
