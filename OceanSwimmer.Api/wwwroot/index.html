<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-E96VQVFFRF"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-E96VQVFFRF');
    </script>

    <meta charset="UTF-8" />
    <title>OceanSwimmer Results Search</title>

    <link rel="icon" href="/favicon.ico" />

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- DataTables (sorting + export) -->
    <link rel="stylesheet"
          href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css" />
    <link rel="stylesheet"
          href="https://cdn.datatables.net/buttons/2.4.2/css/buttons.dataTables.min.css" />

    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 2rem;
        }

        h1 {
            margin-bottom: 1rem;
        }

        form {
            margin-bottom: 1.5rem;
        }

        input {
            padding: 0.4rem;
            margin-right: 0.5rem;
        }

        button {
            padding: 0.45rem 0.8rem;
            cursor: pointer;
        }

        a {
            color: #0066cc;
            cursor: pointer;
            text-decoration: underline;
        }

        #raceCount strong {
            color: #333;
            font-size: 13px;
            margin-top: -5px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <h1 style="display:flex; align-items:center;">
        <a href="/" style="display:flex; align-items:center; gap:10px; text-decoration:none; color:inherit;">
            <img src="/favicon-32x32.png" alt="Home" style="width:28px; height:28px;" />
            <span>Ocean Swimmer Results</span>
        </a>
    </h1>

    <div id="raceCount" style="color:#666; margin-bottom:15px;"></div>

    <form id="searchForm">
        <input type="text" id="forename" placeholder="Forename" />
        <input type="text" id="surname" placeholder="Surname" />
        <button type="submit">Search</button>
    </form>

    <div id="resultCount" style="margin-bottom: 0.5rem; font-weight: 600;"></div>

    <table id="resultsTable" class="display" style="width:100%">
        <thead>
            <tr>
                <th>Race</th>
                <th>Date</th>
                <th>Distance</th>
                <th>Time</th>

                <th>Name</th>

                <th>Category</th>
                <th>Category Pos</th>
                <th>Category %</th>

                <th>Overall Pos</th>
                <th>Overall %</th>

                <th>Gender</th>
                <th>Gender Pos</th>
                <th>Gender %</th>
            </tr>
        </thead>



        <tbody></tbody>
    </table>

    <p>
        Found an issue or want to suggest a feature?
        <a href="/feedback.html">Send feedback</a>
    </p>

    <div style="margin-bottom: 1em;">
        <button onclick="loadRaces()">List all races</button>
        <input id="raceSearch"
               placeholder="Search races…"
               onkeyup="filterRaces()"
               style="margin-left: 10px;" />
    </div>

    <div id="raceList"></div>

    <script>
        function generateSlug(input) {
            return input
                .toLowerCase()
                .replace(/\|/g, "")
                .replace(/[^\w\s-]/g, "")
                .replace(/\s+/g, "-")
                .replace(/-+/g, "-")
                .replace(/^-+|-+$/g, "");
        }

        function getRaceIdFromUrl() {
            // first try query param (old way)
            const params = new URLSearchParams(window.location.search);
            const raceIdFromQuery = params.get("raceId");
            if (raceIdFromQuery) return raceIdFromQuery;

            // fallback to slug (new SEO way)
            const match = window.location.pathname.match(/-(\d+)$/);
            return match ? match[1] : null;
        }

        function initPage() {

            const params = new URLSearchParams(window.location.search);
            const raceId = getRaceIdFromUrl(); // 👈 changed
            const category = params.get("category");
            const gender = params.get("gender");
            const forename = params.get("forename");
            const surname = params.get("surname");

            console.log("RaceId detected:", raceId);

            if (raceId && category) {
                searchByRaceAndCategory(raceId, category, gender);
            } else if (raceId) {
                searchByRace(raceId);
            } else if (forename || surname) {
                searchByName(forename, surname);
            } else {
                loadRaces(); // 👈 ONLY load default if no race
            }
        }

        // works whether DOM is already loaded or not
        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", initPage);
        } else {
            initPage();
        }
    </script>

    <!-- JS deps -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.2/js/dataTables.buttons.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.html5.min.js"></script>

    <script>
        //const API_BASE = "http://localhost:5221/swims/search"; // change later to api.oceanswimmer.com.au
        //const API_BASE = "https://api.oceanswimmer.com.au/swims/search";
        const API_BASE = "/swims/search";

        let allRaces = [];


        let table = $('#resultsTable').DataTable({
            destroy: true,
            autoWidth: false,
            pageLength: 25,
            columns: [

                // 1️⃣ Race
                {
                    data: "raceName",
                    width: "35%",
                    render: function (data, type, row) {
                        return `
                                          <a href="#"
                                             class="race-link"
                                             data-raceid="${row.raceId}"
                                             data-racedesc="${row.raceName}">
                                            ${data}
                                          </a>`;
                    }
                },

                // 2️⃣ Date
                {
                    data: "raceDate",
                    width: "10%",
                    render: function (data, type) {
                        if (!data) return "";

                        if (type === "display") {
                            const d = new Date(data);
                            return d.toLocaleDateString("en-GB", {
                                day: "2-digit",
                                month: "short",
                                year: "numeric"
                            });
                        }

                        return data; // 👈 raw value used for sorting
                    }
                },

                // 3️⃣ Distance
                { data: "distance", width: "6%" },

                // 4️⃣ Time
                { data: "raceTime", width: "6%" },

                // 5️⃣ Name
                {
                    data: "fullName",
                    width: "20%",
                    render: function (data, type, row) {
                        return `
                                          <a href="#"
                                             class="name-link"
                                             data-forename="${row.forename}"
                                             data-surname="${row.surname}">
                                            ${data}
                                          </a>`;
                    }
                },

                // 6️⃣ Category
                {
                    data: "category",
                    render: function (data, type, row) {
                        return `
                                                        <a href="#"
                                                           class="category-link"
                                                           data-raceid="${row.raceId}"
                                                           data-category="${data}"
                                                           data-gender="${row.gender}">
                                                           ${data}
                                                        </a>`;
                    }
                }
                ,

                // 7️⃣ Category Pos
                { data: "categoryPosition", width: "5%" },

                // 8️⃣ Category %
                {
                    data: "categoryPercentile",
                    width: "5%",
                    render: d => d != null ? `${d.toFixed(2)}%` : ""
                },

                // 9️⃣ Overall Pos
                { data: "overallPosition", width: "5%" },

                // 🔟 Overall %
                {
                    data: "overallPercentile",
                    width: "5%",
                    render: d => d != null ? `${d.toFixed(2)}%` : ""
                },

                { data: "gender" },
                // 1️⃣1️⃣ Gender Pos
                { data: "genderPosition", width: "5%" },

                // 1️⃣2️⃣ Gender %
                {
                    data: "genderPercentile",
                    width: "5%",
                    render: d => d != null ? `${d.toFixed(2)}%` : ""
                }
            ],
            dom: "Bfrtip",
            buttons: ["csv"],
            order: [
                [1, "desc"],   // Date
                [8, "asc"]     // Overall Pos
            ],
            columnDefs: [
                { targets: [4, 5, 6, 7, 8, 9], className: "dt-center" }
            ]

        });

        $('#resultsTable').on('click', 'a.category-link', function (e) {
            e.preventDefault();

            const raceId = this.dataset.raceid;
            const category = this.dataset.category;
            const gender = this.dataset.gender;

            // 👇 get race name from the row
            const raceName = $(this).closest('tr').find('.race-link').data('racedesc');

            // 👇 generate slug
            const slug = generateSlug(raceName);

            // ✅ new clean URL
            let url = `/results/${slug}-${raceId}?category=${encodeURIComponent(category)}`;

            if (gender) {
                url += `&gender=${encodeURIComponent(gender)}`;
            }

            history.pushState({}, "", url);

            searchByRaceAndCategory(
                this.dataset.raceid,
                this.dataset.category,
                this.dataset.gender
            );
        });


        $('#resultsTable').on('click', 'a.race-link', function (e) {
            e.preventDefault();

            const raceId = this.dataset.raceid;
            const raceDesc = this.dataset.racedesc;

            // 👇 generate slug
            const slug = generateSlug(raceDesc);

            // ✅ clean SEO URL
            history.pushState({}, "", `/results/${slug}-${raceId}`);

            searchByRace(
                raceId,
                raceDesc
            );
        });

        $(document).on("click", ".name-link", function (e) {
            e.preventDefault();

            const forename = $(this).data("forename");
            const surname = $(this).data("surname");

            // Clear race context
            $("#resultCount").innerText = "";

            // Run person search
            searchByName(forename, surname);

            // Scroll back to top
            window.scrollTo({ top: 0, behavior: "smooth" });
        });



        async function loadRaces() {
            const res = await fetch("/races");
            allRaces = await res.json();
            renderRaceList(allRaces);
        }

        function filterRaces() {
            const q = document.getElementById("raceSearch").value.toLowerCase();

            const filtered = allRaces.filter(r =>
                r.raceName &&
                r.raceName.toLowerCase().includes(q)
            );

            renderRaceList(filtered);
        }


        function renderRaceList(races) {
            const container = document.getElementById("raceList");
            container.innerHTML = "";

            races.forEach(r => {
                const div = document.createElement("div");

                const a = document.createElement("a");
                //a.href = "#";
                const slug = generateSlug(r.raceName);
                a.href = `/results/${slug}-${r.raceId}`;

                // 👇 Use raceName now
                a.textContent = r.raceName;

                a.dataset.raceId = r.raceId;
                a.dataset.raceName = r.raceName;

                a.onclick = (e) => {
                    e.preventDefault();
                    history.pushState({}, "", a.href);
                    searchByRace(
                        a.dataset.raceId,
                        a.dataset.raceName
                    );
                };

                div.appendChild(a);

                div.appendChild(
                    document.createTextNode(
                        ` – ${r.raceDate ?? ""} · ${r.distance ?? "?"} km · ${r.resultCount} results`
                    )
                );

                container.appendChild(div);
            });
        }



        function searchByRaceAndCategory(raceId, category, gender) {

            const params = new URLSearchParams();
            params.append("raceId", raceId);
            params.append("category", category);
            if (gender)
                params.append("gender", gender);
            params.append("pageSize", 10000);

            fetch(`${API_BASE}?${params.toString()}`)
                .then(res => res.json())
                .then(json => {
                    document.getElementById("resultCount").innerText =
                        `Results for ${category} (${json.count})`;

                    table.clear();
                    table.search("");
                    table.rows.add(json.results);
                    table.draw();

                    window.scrollTo({ top: 0, behavior: "smooth" });
                });
        }


        async function runSearch(forename, surname) {
            const params = new URLSearchParams();
            if (forename) params.append("forename", forename);
            if (surname) params.append("surname", surname);
            params.append("pageSize", 250);

            const res = await fetch(`${API_BASE}?${params.toString()}`);
            const json = await res.json();

            console.log("API response:", json);
            console.log("First row:", json.results?.[0]);

            document.getElementById("resultCount").innerText =
                `${json.count} results returned`;


            table.clear();
            table.search("");
            table.rows.add(json.results);
            table.draw();
            $('.dataTables_filter input').val("");
        }

        function searchByName(forename, surname) {
            $("#forename").val(forename);
            $("#surname").val(surname);
            runSearch(forename, surname);
        }

        function searchByRace(raceId, raceDescription) {

            if (!raceId) {
                console.warn("searchByRace called with invalid raceId:", raceId);
                return;
            }

            $("#forename").val("");
            $("#surname").val("");

            const params = new URLSearchParams();
            params.append("raceId", raceId);
            params.append("pageSize", 10000);

            fetch(`${API_BASE}?${params.toString()}`)
                .then(res => res.json())
                .then(json => {

                    document.getElementById("resultCount").innerText =
                        `Selected race — ${json.count} results`;

                    table.clear();
                    table.search("");
                    table.rows.add(json.results);
                    table.draw();

                    $('.dataTables_filter input').val("");

                    window.scrollTo({ top: 0, behavior: "smooth" });
                })
                .catch(err => {
                    console.error("Race search failed:", err);
                });
        }




        $("#searchForm").on("submit", (e) => {
            e.preventDefault();
            runSearch(
                $("#forename").val(),
                $("#surname").val()
            );
        });

        // handle browser back/forward
        window.addEventListener("popstate", function () {
            const params = new URLSearchParams(window.location.search);

            const raceId = params.get("raceId");
            const category = params.get("category");
            const gender = params.get("gender");
            const forename = params.get("forename");
            const surname = params.get("surname");

            if (raceId && category) {
                searchByRaceAndCategory(raceId, category, gender);
            } else if (raceId) {
                searchByRace(raceId);
            } else if (forename || surname) {
                searchByName(forename, surname);
            }
        });
    </script>


    <script>
        console.log("script loaded");

        fetch('/api/race-count')
            .then(res => res.json())
            .then(count => {
                console.log("count:", count);
                const el = document.getElementById('raceCount');
                if (el) {
                    el.innerText = count + ' races tracked';
                } else {
                    console.log("raceCount div not found");
                }
            })
            .catch(err => console.error("fetch error:", err));
    </script>

</body>
</html>
