    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 2rem;
        }

        h1 {
            margin-bottom: 1rem;
        }

        form {

        button {

        }

        }

            color: #333;
            font-size: 13px;

        }

        /* ── Auth bar ───────────────────────────────────────────────── */
        #authBar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-left: auto;
            font-size: 14px;
        }

        #authBar a, #authBar button {
            font-size: 14px;
        }

        .btn-google {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;

            border-radius: 4px;
            background: #fff;
            color: #3c4043;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            white-space: nowrap;
        }

        }

        .btn-logout {
            background: none;

            border-radius: 4px;
            padding: 5px 12px;
            cursor: pointer;

            color: #555;
        }

        }

        .auth-name {
            color: #333;

        }

        /* ── Claim button ───────────────────────────────────────────── */
        .claim-btn {
            background: none;
            border: none;
            font-size: 18px;

            line-height: 1;
            color: #aaa;

        }

            opacity: 0.4;

        .claim-lock {

        /* ── Quick panels ───────────────────────────────────────── */

            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 1rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);

        .quick-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #f0f0f0;
        }

        .quick-panel-header h3 {
            margin: 0;
            font-size: 1rem;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-panel-toggle {
            background: none;
            border: 1px solid #ccc;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 13px;
            cursor: pointer;
            color: #444;
            transition: all 0.15s;

        .btn-panel-toggle.active {

            border-color: #0066cc;
            color: #fff;
        }

        .panel-table {
            width: 100%;

            font-size: 13px;
        }

            text-align: left;
            padding: 6px 8px;

            color: #666;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            border-bottom: 1px solid #eee;
            white-space: nowrap;
        }

        .panel-table td {
            padding: 6px 8px;
            border-bottom: 1px solid #f5f5f5;
            vertical-align: middle;
        }

        .panel-table tr:last-child td { border-bottom: none; }
        .panel-table tr:hover td { background: #fafafa; }

        /* Right-align numeric cells — keeps headers and data in sync */
        .panel-table th.num,
        .panel-table td.num { text-align: right; }

        .today-btn {
            padding: 2px 10px;
            font-size: 12px;
            border: 1px solid #ccc;
            border-radius: 12px;
            background: #fff;
            cursor: pointer;

        /* ── Tab nav ─────────────────────────────────────────────── */

            font-size: 14px;
        }

        .lb-table th {

            color: #666;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            border-bottom: 2px solid #e5e7eb;
            white-space: nowrap;

        .lb-table td {

        .lb-table tr:hover td { background: #fafafa; }
        .lb-table tr:last-child td { border-bottom: none; }

        #races-search-bar {
            display: flex;
            align-items: center;

            margin-bottom: 1rem;

        .race-table {

        .race-table td {

        }

        .race-table tr:hover td { background: #fafafa; }
        .race-table tr:last-child td { border-bottom: none; }

        .race-table td.num,
        .race-table th.num { text-align: right; }
    </style>
</head>

    <script>
        function generateSlug(input) {
            return input
                .toLowerCase()
                .replace(/\|/g, "")
                .replace(/[^\w\s-]/g, "")
                .replace(/\s+/g, "-")
                .replace(/-+/g, "-")
                .replace(/^-+|-+$/g, "");
        }

        function getRaceIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const raceIdFromQuery = params.get("raceId");
            if (raceIdFromQuery) return raceIdFromQuery;

            const match = window.location.pathname.match(/-(\d+)$/);
            return match ? match[1] : null;
        }

        function initPage() {
            const params   = new URLSearchParams(window.location.search);
            const raceId   = getRaceIdFromUrl();
            const category = params.get("category");
            const gender   = params.get("gender");
            const forename = params.get("forename");
            const surname  = params.get("surname");

            if (raceId && category && category !== 'null') {
                searchByRaceAndCategory(raceId, category, gender);
            } else if (raceId) {
                searchByRace(raceId);
            } else if (forename || surname) {
                searchByName(forename, surname);
            } else {
                loadRacesAndDefault();
            }
        }

        async function loadRacesAndDefault() {
            // Remove the server-rendered block — JS DataTable takes over from here
            document.getElementById('ssr-latest-race')?.remove();
            // Fetch races (needed for auto-select); rendering is deferred until Races tab opens
            const res = await fetch("/races");
            allRaces  = await res.json();
            if (allRaces.length > 0) {
                const top  = allRaces[0];
                const slug = generateSlug(top.raceName);
                history.replaceState({}, "", `/results/${slug}-${top.raceId}`);
                searchByRace(top.raceId, top.raceName);
            }
        }

        // initPage() called at bottom of main script block once everything is defined
    </script>

    <!-- JS deps -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.2/js/dataTables.buttons.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.html5.min.js"></script>

    <script>
        const API_BASE = "/swims/search";

        let allRaces      = [];
        let raceSortCol   = 'date';        // 'date' | 'race' | 'distance' | 'results'
        let raceSortDir   = 'desc';        // 'asc' | 'desc'
        let currentUser   = null;          // null = logged out
        let claimedSwimIds = new Set();    // Set of oceanswimsId integers


        // ── DataTable ────────────────────────────────────────────────
        let table = $('#resultsTable').DataTable({
            destroy: true,
            autoWidth: false,
            pageLength: 25,
            columns: [
                // 0 Race
                {
                    data: "raceName",
                    width: "32%",
                    render: function (data, type, row) {
                        return `<a href="#" class="race-link"
                                   data-raceid="${row.raceId}"
                                   data-racedesc="${row.raceName}">${data}</a>`;
                    }
                },
                // 1 Date
                {
                    data: "raceDate",
                    width: "10%",
                    render: function (data, type) {
                        if (!data) return "";
                        if (type === "display") {
                            const d = new Date(data);
                            return d.toLocaleDateString("en-GB", {
                                day: "2-digit", month: "short", year: "numeric"
                            });
                        }
                        return data;
                    }
                },
                // 2 Distance
                { data: "distance", width: "6%" },
                // 3 Time
                { data: "raceTime", width: "6%" },
                // 4 Name
                {
                    data: "fullName",
                    width: "18%",
                    render: function (data, type, row) {
                        return `<a href="#" class="name-link"
                                   data-forename="${row.forename}"
                                   data-surname="${row.surname}">${data}</a>`;
                    }
                },
                // 5 Category
                {
                    data: "category",
                    render: function (data, type, row) {
                        if (data == null || data === '') return '–';
                        return `<a href="#" class="category-link"
                                   data-raceid="${row.raceId}"
                                   data-category="${data}"
                                   data-gender="${row.gender}">${data}</a>`;
                    }
                },
                // 6 Category Pos
                { data: "categoryPosition",  width: "5%" },
                // 7 Category %
                { data: "categoryPercentile",  width: "5%",
                  render: d => d != null ? `${d.toFixed(2)}%` : "" },
                // 8 Overall Pos
                { data: "overallPosition",   width: "5%" },
                // 9 Overall %
                { data: "overallPercentile", width: "5%",
                  render: d => d != null ? `${d.toFixed(2)}%` : "" },
                // 10 Gender
                { data: "gender" },
                // 11 Gender Pos
                { data: "genderPosition",    width: "5%" },
                // 12 Gender %
                { data: "genderPercentile",  width: "5%",
                  render: d => d != null ? `${d.toFixed(2)}%` : "" },
                // 13 Claim ★
                {
                    data: "oceanswimsId",
                    orderable: false,
                    width: "4%",
                    render: function (data, type, row) {
                        if (!data) return "";

                        if (!currentUser) {
                            return `<a href="/login/google" class="claim-lock" title="Sign in to claim">🔒</a>`;
                        }

                        // Near-match rows (phonetically similar surname) — show ? button
                        if (row._nearMatch && !claimedSwimIds.has(data)) {
                            const rowName = `${row.forename || ''} ${row.surname || ''}`.trim();
                            return `<button class="claim-near-btn"
                                            data-id="${data}"
                                            data-rowname="${rowName}"
                                            title="Name differs slightly — is this you?">?</button>`;
                        }

                        const claimed = claimedSwimIds.has(data);
                        return `<button class="claim-btn ${claimed ? 'claimed' : ''}"
                                        data-id="${data}"
                                        title="${claimed ? 'Remove claim' : 'Claim this swim'}">
                                    ${claimed ? '★' : '☆'}
                                </button>`;
                    }
                }
            ],
            dom: "Bfrtip",
            buttons: ["csv"],
            order: [[1, "desc"], [8, "asc"]],
            columnDefs: [

        function sortRaces(col) {
            // Distance and Results default to descending first; Date and Race to ascending
            const defaultDir = (col === 'distance' || col === 'results') ? 'desc' : 'asc';
            if (raceSortCol === col) {
                raceSortDir = raceSortDir === 'asc' ? 'desc' : 'asc';
            } else {
                raceSortCol = col;
                raceSortDir = defaultDir;
            }
            filterRaces();
        }

        function applySortToRaces(races) {
            const dir = raceSortDir === 'asc' ? 1 : -1;
            return [...races].sort((a, b) => {
                switch (raceSortCol) {
                    case 'date':
                        const pd = s => { const p = (s||'').split('-'); return p.length===3 ? new Date(`${p[1]} ${p[0]}, ${p[2]}`) : new Date(0); };
                        return dir * (pd(a.raceDate) - pd(b.raceDate));
                    case 'race':
                        return dir * ((a.raceName || '').localeCompare(b.raceName || ''));
                    case 'distance':
                        return dir * ((a.distance ?? 0) - (b.distance ?? 0));
                    case 'results':
                        return dir * ((a.resultCount ?? 0) - (b.resultCount ?? 0));
                    default:
                        return 0;
                }
            });
        }

            const container = document.getElementById("raceList");
            const countEl   = document.getElementById("races-count");

            if (!races.length) {
                container.innerHTML = `<p style="color:#999;font-size:14px;">No races match your search.</p>`;

            container.innerHTML = `

        // ── Near-match detection (for ? button) ──────────────────────

        function levenshtein(a, b) {
            const m = a.length, n = b.length;
            const dp = Array.from({ length: m + 1 }, (_, i) =>
                Array.from({ length: n + 1 }, (_, j) => i === 0 ? j : j === 0 ? i : 0));
            for (let i = 1; i <= m; i++)
                for (let j = 1; j <= n; j++)
                    dp[i][j] = a[i-1] === b[j-1]
                        ? dp[i-1][j-1]
                        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
            return dp[m][n];
        }

        function isNearMatch(row) {
            if (!currentUser?.swimmerForename && !currentUser?.swimmerSurname) return false;
            const forenameMatch = (row.forename || '').toLowerCase() ===
                (currentUser.swimmerForename || '').toLowerCase();
            const surnameExact  = (row.surname  || '').toLowerCase() ===
                (currentUser.swimmerSurname  || '').toLowerCase();
            if (forenameMatch && surnameExact) return false; // exact — handled by normal ☆
            const surnameDist = levenshtein(
                (row.surname  || '').toLowerCase(),
                (currentUser.swimmerSurname || '').toLowerCase()
            );
            return forenameMatch && surnameDist <= 2;
        }

        // ── Swims to Claim panel ──────────────────────────────────

        async function loadSwimsToClaim() {
            if (!currentUser) return;
            const wrap = document.getElementById('swimsToClaimPanelWrap');
            wrap.innerHTML = `<div class="quick-panel"><p style="color:#999;font-size:13px;">Searching for your results…</p></div>`;

            const forename = (currentUser.swimmerForename || '').trim();

            try {
                const params = new URLSearchParams({ pageSize: 2000 });
                if (forename) params.append('forename', forename);
                if (surname)  params.append('surname',  surname);

                const [exactJson, nearJson] = await Promise.all([
                    fetch(`/swims/search?${params}`).then(r => r.json()),
                    fetch(`/swims/search-similar?forename=${encodeURIComponent(forename)}&surname=${encodeURIComponent(surname)}`)

                ].sort((a, b) => new Date(b.raceDate) - new Date(a.raceDate));

                renderSwimsToClaim();

        function renderSwimsToClaim() {

            const cutoff      = new Date();

            const unclaimed   = swimsToClaimData.filter(r => !claimedSwimIds.has(r.oceanswimsId));
            const recentRows  = unclaimed.filter(r => r.raceDate && new Date(r.raceDate) >= cutoff);
            const toShow      = swimsToClaimRecent ? recentRows : unclaimed;

            if (unclaimed.length === 0) {
                wrap.innerHTML = `
                    <div class="quick-panel">
                        <div class="quick-panel-header"><h3>☆ Results to Claim</h3></div>
                        <p style="color:#888;font-size:13px;margin:0;">All matching results have been claimed! 🎉</p>
                    </div>`;
                return;
            }

            const recentBtnHtml = recentRows.length > 0 || swimsToClaimRecent
                ? `<button class="today-btn${swimsToClaimRecent ? ' active' : ''}" onclick="toggleRecentFilter()">
                       📅 ${swimsToClaimRecent ? 'Show all' : `Completed recently? (${recentRows.length})`}
                   </button>`
                : '';

            const rows = toShow.slice(0, 100).map(r => {
                const nameHtml = r._nearMatch
                    ? `${r.forename || ''} ${r.surname || ''} <span class="near-badge">~</span>`
                    : `${r.forename || ''} ${r.surname || ''}`;
                return `
                    <tr id="stc-row-${r.oceanswimsId}">
                        <td style="white-space:nowrap">${panelFmtDate(r.raceDate)}</td>
                        <td><a href="/results/${generateSlug(r.raceName)}-${r.raceId}">${r.raceName ?? '–'}</a></td>
                        <td>${nameHtml}</td>
                        <td class="num">${r.distance ?? '–'} km</td>
                        <td class="num">${r.raceTime ?? '–'}</td>
                        <td class="num">${r.overallPosition != null
                            ? `${r.overallPosition} / ${r.overallCompetitors}` : '–'}</td>
                        <td>
                            <button class="claim-btn panel-claim-btn"
                                    data-id="${r.oceanswimsId}"
                                    data-near="${r._nearMatch ? '1' : '0'}"
                                    data-rowname="${(r.forename || '') + ' ' + (r.surname || '')}"
                                    title="Claim this result">☆</button>
                        </td>
                    </tr>`;
            }).join('');

            const noTodayMsg = swimsToClaimRecent && toShow.length === 0
                ? `<p style="color:#888;font-size:13px;margin:0;">
                       No unclaimed results in the last ${RECENTLY_DAYS} days.
                       <button class="today-btn" onclick="toggleRecentFilter()">Show all ${unclaimed.length}</button>
                   </p>`
                : '';

            const moreNote = toShow.length > 100
                ? `<p style="font-size:12px;color:#999;margin:8px 0 0 0;">Showing first 100 results.</p>` : '';

            wrap.innerHTML = `
                <div class="quick-panel">
                    <div class="quick-panel-header">
                        <h3>
                            ☆ Results to Claim
                            <span style="font-size:13px;font-weight:400;color:#888;">${unclaimed.length} unclaimed</span>
                            ${recentBtnHtml}
                        </h3>
                        <button class="btn-panel-toggle" onclick="claimAllInPanel()" style="font-size:12px;">
                            ★ Claim All Shown
                        </button>
                    </div>
                    ${noTodayMsg}
                    ${rows ? `
                        <div style="overflow-x:auto;max-height:420px;overflow-y:auto;">
                            <table class="panel-table">
                                <thead>
                                    <tr><th>Date</th><th>Race</th><th>Name</th><th class="num">Dist</th><th class="num">Time</th><th class="num">Overall</th><th></th></tr>
                                </thead>
                                <tbody>${rows}</tbody>
                            </table>
                        </div>
                        ${moreNote}` : ''}
                </div>`;
        }

        function toggleRecentFilter() {
            swimsToClaimRecent = !swimsToClaimRecent;
            renderSwimsToClaim();
        }

        // Claim all rows currently visible in the Results to Claim panel
        async function claimAllInPanel() {
            if (!currentUser) return;

            const cutoff    = new Date();
            cutoff.setDate(cutoff.getDate() - RECENTLY_DAYS);
            const unclaimed = swimsToClaimData.filter(r => !claimedSwimIds.has(r.oceanswimsId));
            const toShow    = swimsToClaimRecent
                ? unclaimed.filter(r => r.raceDate && new Date(r.raceDate) >= cutoff)
                : unclaimed;
            const ids = toShow.map(r => r.oceanswimsId).filter(Boolean);
            if (!ids.length) return;

            try {
                const res = await fetch('/swims/claim-all', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ ids })
                });
                if (res.ok) {
                    const swimsRes = await fetch('/athlete/swims');
                    if (swimsRes.ok) {
                        const swims = await swimsRes.json();
                        claimedSwimIds = new Set(swims.map(s => s.oceanswimsid));
                    }
                    mySwimsPanelLoaded = false;
                    table.draw(false);
                    updateClaimAllBtn();
                    renderSwimsToClaim();
                }
            } catch { /* ignore */ }
        }

        // Click handler for ☆ buttons inside the Swims to Claim panel
        $(document).on('click', '.panel-claim-btn', async function () {
            const id      = parseInt($(this).data('id'));
            const isNear  = $(this).data('near') === '1';
            const rowName = $(this).data('rowname');

            if (isNear) {
                const ok = confirm(`This result shows the name as "${rowName.trim()}".\n\nIs this your swim?`);
                if (!ok) return;
            }

            $(this).prop('disabled', true);
            const endpoint = isNear ? `/swims/${id}/claim-manual` : `/swims/${id}/claim`;

            try {
                const res = await fetch(endpoint, { method: 'POST' });
                if (res.ok) {
                    claimedSwimIds.add(id);
                    mySwimsPanelLoaded = false;
                    table.draw(false);
                    updateClaimAllBtn();
                    $(`#stc-row-${id}`).fadeOut(200, () => renderSwimsToClaim());
                } else if (res.status === 409) {
                    const err = await res.json().catch(() => ({}));
                    alert(err.error || 'You have already claimed a result for this race.');
                    $(this).prop('disabled', false);
                } else {
                    $(this).prop('disabled', false);
                }
            } catch {
                $(this).prop('disabled', false);
            }
        });


        // ── Leaderboards ─────────────────────────────────────────────

        let lbAlltimeLoaded      = false;
        let lbSeasonsLoaded      = false;
        let lbCurrentSeason      = null;
        let lbRacesLoaded        = false;
        let lbRaceSeasonsLoaded  = false;
        let lbPodiumLoaded       = false;
        let lbPodiumSeasonsLoaded = false;
        let lbCurrentPodiumSeason = null;
        let lbCurrentRaceSeason  = null;

        // Stored data + sort state for swimmer leaderboards
        let lbAlltimeData   = null;
        let lbSeasonalData  = null;
        let lbSwimmerSort   = { col: 'totalSwims', dir: -1 }; // -1 = descending

        function sortLbSwimmers(col) {
            lbSwimmerSort.dir = (lbSwimmerSort.col === col) ? -lbSwimmerSort.dir : -1;
            lbSwimmerSort.col = col;
            const isAllTime = document.getElementById('lb-alltime-wrap').style.display !== 'none';
            const data  = isAllTime ? lbAlltimeData  : lbSeasonalData;
            const wrap  = document.getElementById(isAllTime ? 'lb-alltime-wrap' : 'lb-seasonal-wrap');
            const mode  = isAllTime ? 'alltime' : 'seasonal';
            if (!data) return;
            const sorted = [...data].sort((a, b) => {
                const va = a[col] ?? 0, vb = b[col] ?? 0;
                return lbSwimmerSort.dir * (va - vb);
            });
            wrap.innerHTML = renderLbTable(sorted, mode);
        }

        function showLbTab(name) {
            document.querySelectorAll('.lb-sub-btn').forEach(b =>
                b.classList.toggle('active', b.dataset.lb === name));
            document.getElementById('lb-alltime-wrap').style.display        = name === 'alltime'         ? '' : 'none';
            document.getElementById('lb-seasonal-wrap').style.display       = name === 'seasonal'        ? '' : 'none';
            document.getElementById('lb-season-wrap').style.display         = name === 'seasonal'        ? '' : 'none';
            document.getElementById('lb-races-filter-wrap').style.display   = name === 'races'           ? '' : 'none';
            document.getElementById('lb-races-wrap').style.display          = name === 'races'           ? '' : 'none';
            document.getElementById('lb-races-seasonal-wrap').style.display = name === 'races-seasonal'  ? '' : 'none';
            document.getElementById('lb-race-season-wrap').style.display    = name === 'races-seasonal'  ? '' : 'none';
            document.getElementById('lb-podium-wrap').style.display         = name === 'podium'          ? '' : 'none';
            document.getElementById('lb-podium-seasonal-wrap').style.display= name === 'podium-seasonal' ? '' : 'none';
            document.getElementById('lb-podium-season-wrap').style.display  = name === 'podium-seasonal' ? '' : 'none';

            if (name === 'alltime'         && !lbAlltimeLoaded)      loadLbAllTime();
            if (name === 'seasonal'        && !lbSeasonsLoaded)      loadLbSeasons();
            if (name === 'races'           && !lbRacesLoaded)        loadLbRaces();
            if (name === 'races-seasonal'  && !lbRaceSeasonsLoaded)  loadLbRaceSeasons();
            if (name === 'podium'          && !lbPodiumLoaded)       loadLbPodium();
            if (name === 'podium-seasonal' && !lbPodiumSeasonsLoaded) loadLbPodiumSeasons();
        }

        async function loadLbAllTime() {
            const wrap = document.getElementById('lb-alltime-wrap');
            wrap.innerHTML = '<p style="color:#999;font-size:14px;">Loading…</p>';
            try {
                const rows = await fetch('/leaderboard/alltime').then(r => r.json());
                lbAlltimeLoaded = true;
                lbAlltimeData   = rows;
                lbSwimmerSort   = { col: 'totalSwims', dir: -1 };
                wrap.innerHTML  = renderLbTable(rows, 'alltime');
            } catch {
                wrap.innerHTML = '<p style="color:#c00;font-size:14px;">Could not load leaderboard.</p>';
            }
        }

        async function loadLbSeasons() {
            const sel = document.getElementById('lb-season-select');
            try {
                const seasons = await fetch('/leaderboard/seasons').then(r => r.json());
                sel.innerHTML = seasons.map(s => `<option value="${s}">${s}</option>`).join('');
                lbSeasonsLoaded = true;
                if (seasons.length > 0) loadSeasonal(seasons[0]);
            } catch {
                document.getElementById('lb-seasonal-wrap').innerHTML =
                    '<p style="color:#c00;font-size:14px;">Could not load seasons.</p>';
            }
        }

        async function loadSeasonal(season) {
            if (lbCurrentSeason === season) return;
            lbCurrentSeason = season;
            const wrap = document.getElementById('lb-seasonal-wrap');
            wrap.innerHTML = '<p style="color:#999;font-size:14px;">Loading…</p>';
            try {
                const rows = await fetch(`/leaderboard/seasonal?season=${season}`).then(r => r.json());
                lbSeasonalData  = rows;
                lbSwimmerSort   = { col: 'totalSwims', dir: -1 };
                wrap.innerHTML  = renderLbTable(rows, 'seasonal');
            } catch {
                wrap.innerHTML = '<p style="color:#c00;font-size:14px;">Could not load season.</p>';
            }
        }

        function renderLbTable(rows, mode) {
            if (!rows || rows.length === 0)
                return '<p style="color:#999;font-size:14px;">No data available.</p>';

            const isAllTime = mode === 'alltime';

            // Clickable sort header helper
            function sortTh(label, col) {
                const active = lbSwimmerSort.col === col;
                const arrow  = active ? (lbSwimmerSort.dir === -1 ? ' ↓' : ' ↑') : '';
                return `<th class="num" style="cursor:pointer;user-select:none" onclick="sortLbSwimmers('${col}')">${label}${arrow}</th>`;
            }

            const headerCols = isAllTime
                ? `<th class="lb-rank">#</th><th>Swimmer</th>${sortTh('Swims','totalSwims')}${sortTh('Distance','totalDistanceKm')}<th>First Swim</th><th>Last Swim</th>`
                : `<th class="lb-rank">#</th><th>Swimmer</th>${sortTh('Swims','totalSwims')}${sortTh('Distance','totalDistanceKm')}`;

            const bodyRows = rows.map((r, i) => {
                const rank     = i + 1;
                const rankCls  = rank === 1 ? 'lb-rank-1' : rank === 2 ? 'lb-rank-2' : rank === 3 ? 'lb-rank-3' : 'lb-rank';
                const medal    = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
                const name     = r.fullName || `${r.forename || ''} ${r.surname || ''}`.trim();
                const dist     = r.totalDistanceKm != null ? `${parseFloat(r.totalDistanceKm).toFixed(1)} km` : '–';

                const nameCel  = `<a href="#" class="lb-name-link"
                                     data-forename="${(r.forename || '').replace(/"/g,'&quot;')}"
                                     data-surname="${(r.surname  || '').replace(/"/g,'&quot;')}">${name}</a>`;

                const extraCols = isAllTime ? `
                    <td>${r.firstSwimDate ? new Date(r.firstSwimDate).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '–'}</td>
                    <td>${r.lastSwimDate  ? new Date(r.lastSwimDate) .toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '–'}</td>` : '';

                return `<tr>
                    <td class="${rankCls}">${medal}</td>
                    <td>${nameCel}</td>
                    <td class="num">${r.totalSwims}</td>
                    <td class="num">${dist}</td>
                    ${extraCols}
                </tr>`;
            }).join('');

            return `<table class="lb-table">
                <thead><tr>${headerCols}</tr></thead>
                <tbody>${bodyRows}</tbody>
            </table>`;
        }

        // ── Race leaderboard functions ────────────────────────────────

        let lbRacesAllData = null;

        async function loadLbRaces() {
            const wrap = document.getElementById('lb-races-wrap');
            wrap.innerHTML = '<p style="color:#999;font-size:14px;">Loading…</p>';
            try {
                const rows = await fetch('/leaderboard/races').then(r => r.json());
                lbRacesLoaded  = true;
                lbRacesAllData = rows;
                renderFilteredRaces('');
            } catch {
                wrap.innerHTML = '<p style="color:#c00;font-size:14px;">Could not load race leaderboard.</p>';
            }
        }

        function filterLbRaces(query) {
            renderFilteredRaces(query);
        }

        function renderFilteredRaces(query) {
            const q = (query || '').trim().toLowerCase();
            const filtered = q
                ? lbRacesAllData.filter(r => (r.raceName || '').toLowerCase().includes(q))
                : lbRacesAllData;

            document.getElementById('lb-races-count').textContent =
                q ? `${filtered.length} match${filtered.length !== 1 ? 'es' : ''}` : `${lbRacesAllData.length} editions`;

            document.getElementById('lb-races-wrap').innerHTML = renderLbRacesTable(filtered);
        }

        async function loadLbRaceSeasons() {
            const sel = document.getElementById('lb-race-season-select');
            try {
                const seasons = await fetch('/leaderboard/race-seasons').then(r => r.json());
                sel.innerHTML = seasons.map(s => `<option value="${s}">${s}</option>`).join('');
                lbRaceSeasonsLoaded = true;
                if (seasons.length > 0) loadRaceSeasonal(seasons[0]);
            } catch {
                document.getElementById('lb-races-seasonal-wrap').innerHTML =
                    '<p style="color:#c00;font-size:14px;">Could not load race seasons.</p>';
            }
        }

        async function loadRaceSeasonal(year) {
            if (lbCurrentRaceSeason === year) return;
            lbCurrentRaceSeason = year;
            const wrap = document.getElementById('lb-races-seasonal-wrap');
            wrap.innerHTML = '<p style="color:#999;font-size:14px;">Loading…</p>';
            try {
                const rows = await fetch(`/leaderboard/races/seasonal?year=${year}`).then(r => r.json());
                wrap.innerHTML = renderLbRacesTable(rows);
            } catch {
                wrap.innerHTML = '<p style="color:#c00;font-size:14px;">Could not load race season.</p>';
            }
        }

        function renderLbRacesTable(rows) {
            if (!rows || rows.length === 0)
                return '<p style="color:#999;font-size:14px;">No data available.</p>';

            // Both all-time and by-season show per-edition rows — same columns
            const headerCols = `<th class="lb-rank">#</th><th>Race</th><th>Date</th><th class="num">Events</th><th class="num">Competitors</th>`;

            const bodyRows = rows.map((r, i) => {
                const rank    = i + 1;
                const rankCls = rank === 1 ? 'lb-rank-1' : rank === 2 ? 'lb-rank-2' : rank === 3 ? 'lb-rank-3' : 'lb-rank';
                const medal   = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
                const dateStr  = r.raceDate
                    ? new Date(r.raceDate).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' })
                    : '–';
                const raceCell = r.raceId && r.raceName
                    ? `<a href="/results/${generateSlug(r.raceName)}-${r.raceId}"
                          style="color:#0066cc;text-decoration:none"
                          onmouseover="this.style.textDecoration='underline'"
                          onmouseout="this.style.textDecoration='none'">${r.raceName}</a>`
                    : (r.raceName || '–');
                return `<tr>
                    <td class="${rankCls}">${medal}</td>
                    <td>${raceCell}</td>
                    <td>${dateStr}</td>
                    <td class="num">${r.events ?? '–'}</td>
                    <td class="num">${(r.totalCompetitors ?? 0).toLocaleString()}</td>
                </tr>`;
            }).join('');

            return `<table class="lb-table">
                <thead><tr>${headerCols}</tr></thead>
                <tbody>${bodyRows}</tbody>
            </table>`;
        }

        // ── Podium leaderboard functions ──────────────────────────────

        let lbPodiumAlltimeData  = null;
        let lbPodiumSeasonalData = null;
        let lbPodiumSort = { col: 'firsts', dir: -1 };

        function sortLbPodium(col) {
            lbPodiumSort.dir = (lbPodiumSort.col === col) ? -lbPodiumSort.dir : -1;
            lbPodiumSort.col = col;
            const isAllTime = document.getElementById('lb-podium-wrap').style.display !== 'none';
            const data = isAllTime ? lbPodiumAlltimeData : lbPodiumSeasonalData;
            const wrap = document.getElementById(isAllTime ? 'lb-podium-wrap' : 'lb-podium-seasonal-wrap');
            if (!data) return;
            const sorted = [...data].sort((a, b) => {
                const va = a[col] ?? 0, vb = b[col] ?? 0;
                if (col === 'swimmer') return lbPodiumSort.dir * ((a.fullName||'').localeCompare(b.fullName||''));
                return lbPodiumSort.dir * (va - vb);
            });
            wrap.innerHTML = renderLbPodiumTable(sorted);
        }

        async function loadLbPodium() {
            const wrap = document.getElementById('lb-podium-wrap');
            wrap.innerHTML = '<p style="color:#999;font-size:14px;">Loading…</p>';
            try {
                const rows = await fetch('/leaderboard/podium/alltime').then(r => r.json());
                lbPodiumLoaded      = true;
                lbPodiumAlltimeData = rows;
                lbPodiumSort        = { col: 'firsts', dir: -1 };
                wrap.innerHTML      = renderLbPodiumTable(rows);
            } catch {
                wrap.innerHTML = '<p style="color:#c00;font-size:14px;">Could not load podium leaderboard.</p>';
            }
        }

        async function loadLbPodiumSeasons() {
            const sel = document.getElementById('lb-podium-season-select');
            try {
                const seasons = await fetch('/leaderboard/podium/seasons').then(r => r.json());
                sel.innerHTML = seasons.map(s => `<option value="${s}">${s}</option>`).join('');
                lbPodiumSeasonsLoaded = true;
                if (seasons.length > 0) loadPodiumSeasonal(seasons[0]);
            } catch {
                document.getElementById('lb-podium-seasonal-wrap').innerHTML =
                    '<p style="color:#c00;font-size:14px;">Could not load podium seasons.</p>';
            }
        }

        async function loadPodiumSeasonal(season) {
            if (lbCurrentPodiumSeason === season) return;
            lbCurrentPodiumSeason = season;
            const wrap = document.getElementById('lb-podium-seasonal-wrap');
            wrap.innerHTML = '<p style="color:#999;font-size:14px;">Loading…</p>';
            try {
                const rows = await fetch(`/leaderboard/podium/seasonal?season=${season}`).then(r => r.json());
                lbPodiumSeasonalData = rows;
                lbPodiumSort         = { col: 'firsts', dir: -1 };
                wrap.innerHTML       = renderLbPodiumTable(rows);
            } catch {
                wrap.innerHTML = '<p style="color:#c00;font-size:14px;">Could not load podium season.</p>';
            }
        }

        function renderLbPodiumTable(rows) {
            if (!rows || rows.length === 0)
                return '<p style="color:#999;font-size:14px;">No data available.</p>';

            function podiumTh(label, col) {
                const active = lbPodiumSort.col === col;
                const arrow  = active ? (lbPodiumSort.dir === -1 ? ' ↓' : ' ↑') : '';
                return `<th class="num" style="cursor:pointer;user-select:none" onclick="sortLbPodium('${col}')">${label}${arrow}</th>`;
            }
            function swimmerTh() {
                const active = lbPodiumSort.col === 'swimmer';
                const arrow  = active ? (lbPodiumSort.dir === -1 ? ' ↓' : ' ↑') : '';
                return `<th style="cursor:pointer;user-select:none" onclick="sortLbPodium('swimmer')">Swimmer${arrow}</th>`;
            }

            const headerCols = `<th class="lb-rank">#</th>${swimmerTh()}${podiumTh('🥇 1sts','firsts')}${podiumTh('🥈 2nds','seconds')}${podiumTh('🥉 3rds','thirds')}${podiumTh('Top 10s','topTens')}${podiumTh('Avg %ile','avgPercentile')}`;

            const bodyRows = rows.map((r, i) => {
                const rank    = i + 1;
                const rankCls = rank === 1 ? 'lb-rank-1' : rank === 2 ? 'lb-rank-2' : rank === 3 ? 'lb-rank-3' : 'lb-rank';
                const medal   = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
                const name    = r.fullName || `${r.forename || ''} ${r.surname || ''}`.trim();
                const nameCel = `<a href="#" class="lb-name-link"
                                    data-forename="${(r.forename || '').replace(/"/g,'&quot;')}"
                                    data-surname="${(r.surname  || '').replace(/"/g,'&quot;')}">${name}</a>`;
                const pct     = r.avgPercentile != null ? `${parseFloat(r.avgPercentile).toFixed(1)}%` : '–';
                return `<tr>
                    <td class="${rankCls}">${medal}</td>
                    <td>${nameCel}</td>
                    <td class="num">${r.firsts}</td>
                    <td class="num">${r.seconds}</td>
                    <td class="num">${r.thirds}</td>
                    <td class="num">${r.topTens}</td>
                    <td class="num">${pct}</td>
                </tr>`;
            }).join('');

            return `<table class="lb-table">
                <thead><tr>${headerCols}</tr></thead>
                <tbody>${bodyRows}</tbody>
            </table>`;
        }

        // Click a swimmer name in the leaderboard → switch to Results tab and search
        $(document).on('click', '.lb-name-link', function (e) {
            e.preventDefault();
            const forename = $(this).data('forename');
            const surname  = $(this).data('surname');
            showTab('results');
            searchByName(forename, surname);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });


        // ── Tab switching ─────────────────────────────────────────────

        function showTab(name) {
            document.getElementById("tab-results").style.display      = name === "results"      ? "" : "none";
            document.getElementById("tab-races").style.display        = name === "races"        ? "" : "none";
            document.getElementById("tab-leaderboards").style.display = name === "leaderboards" ? "" : "none";
            document.querySelectorAll(".tab-btn").forEach(b => {
                b.classList.toggle("active", b.dataset.tab === name);
            });
            // Lazy-render races if switching to the tab for the first time
            if (name === "races") {
                if (allRaces.length > 0 && !document.querySelector(".race-table")) {
                    renderRaceList(allRaces);
                } else if (allRaces.length === 0) {
                    // allRaces not yet loaded (page was opened on a specific race URL)
                    fetch("/races")
                        .then(r => r.json())
                        .then(data => {
                            allRaces = data;
                            renderRaceList(allRaces);
                        });
                }
            }
            // Lazy-load leaderboard all-time on first open
            if (name === "leaderboards" && !lbAlltimeLoaded) {
                loadLbAllTime();
            }
        }


        // ── Bootstrap ────────────────────────────────────────────────
        initAuth();   // check login state on every page load
        initPage();   // load races / run search based on URL params
    </script>

    <script>
        fetch('/api/race-count')
            .then(res => res.json())
            .then(count => {
                const el = document.getElementById('raceCount');
                if (el) el.innerText = count + ' races tracked';
            })
            .catch(err => console.error("fetch error:", err));
    </script>

</body>
</html>
