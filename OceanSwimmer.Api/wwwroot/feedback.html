<!DOCTYPE html>
<html>
<head>
    <title>OceanSwimmer Feedback</title>
    <meta name="description" content="Share feedback or suggest a feature for the OceanSwimmer results site." />

    <!-- Open Graph -->
    <meta property="og:title" content="Send Feedback – OceanSwimmer" />
    <meta property="og:description" content="Share feedback or suggest a feature for the OceanSwimmer results site." />
    <meta property="og:image" content="https://oceanswimmer.com.au/images/og-image.png" />
    <meta property="og:url" content="https://oceanswimmer.com.au/feedback.html" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="https://oceanswimmer.com.au/feedback.html" />

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 30px;
        }

        h1 {
            margin-bottom: 10px;
        }

        form {
            max-width: 600px;
        }

        label {
            font-weight: bold;
        }

        input, textarea, select {
            width: 100%;
            padding: 6px;
            margin-top: 4px;
            margin-bottom: 14px;
            border: 1px solid #aaa;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
        }

        button {
            padding: 8px 16px;
            background: #3b6fb6;
            color: white;
            border: none;
            cursor: pointer;
        }

            button:hover {
                background: #2f5c99;
            }
    </style>
</head>
<body>

    <h1>🏊 Ocean Swimmer Results</h1>

    <h2>Feedback / Requests</h2>

    <form method="post" action="/api/feedback">

        <!-- Honeypot: hidden from humans, irresistible to bots. If filled, the server silently drops the submission. -->
        <div style="position:absolute; left:-10000px; top:auto; width:1px; height:1px; overflow:hidden;" aria-hidden="true">
            <label for="Website">Website</label>
            <input type="text" id="Website" name="Website" tabindex="-1" autocomplete="off">
        </div>

        <label>Name</label>
        <input type="text" name="FeedbackName">

        <label>Email (optional)</label>
        <input type="email" name="FeedbackEmail">

        <label>Type</label>
        <select name="RequestType">
            <option value="General">General Feedback</option>
            <option value="IncorrectResult">Incorrect Result</option>
            <option value="MissingResult">Missing Result</option>
            <option value="FeatureRequest">Feature Request</option>
        </select>

        <label>What would you like us to fix or improve?</label>
<textarea name="FeedbackMessage" rows="6" required></textarea>

        <input type="hidden" name="PageUrl" id="PageUrl">

        <button type="submit">Send Feedback</button>

    </form>

    <script>
        document.getElementById("PageUrl").value = window.location.href;
    </script>


    <p><a href="/">← Back to results</a></p>

</body>
</html>
