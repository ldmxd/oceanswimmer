<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Forgot Password – OceanSwimmer</title>
    <meta name="description" content="Reset your OceanSwimmer account password." />

    <!-- Open Graph -->
    <meta property="og:title" content="Forgot Password – OceanSwimmer" />
    <meta property="og:description" content="Reset your OceanSwimmer account password." />
    <meta property="og:image" content="https://oceanswimmer.com.au/images/og-image.png" />
    <meta property="og:url" content="https://oceanswimmer.com.au/forgot-password.html" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="https://oceanswimmer.com.au/forgot-password.html" />
    <link rel="icon" href="/images/favicon.ico" />
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f3f4f6;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.10);
            padding: 2rem 2.2rem;
            width: 100%;
            max-width: 380px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: inherit;
            margin-bottom: 1.6rem;
        }

        .logo span { font-size: 1.2rem; font-weight: 600; }

        h2 { margin: 0 0 0.5rem; font-size: 1.25rem; color: #222; }

        p.subtitle {
            margin: 0 0 1.4rem;
            font-size: 13px;
            color: #666;
        }

        label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 4px;
            margin-top: 12px;
        }

        input[type="email"] {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s;
        }

        input:focus { border-color: #0066cc; }

        .btn-primary {
            display: block;
            width: 100%;
            padding: 10px;
            background: #0066cc;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 18px;
            transition: background 0.15s;
        }

        .btn-primary:hover { background: #0052a3; }
        .btn-primary:disabled { opacity: 0.6; cursor: default; }

        .msg {
            font-size: 13px;
            padding: 9px 12px;
            border-radius: 6px;
            margin-bottom: 14px;
            display: none;
        }

        .msg.error   { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
        .msg.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }

        .footer-links {
            text-align: center;
            margin-top: 18px;
            font-size: 13px;
            color: #666;
        }

        .footer-links a { color: #0066cc; }
    </style>
</head>
<body>

<div class="card">
    <a href="/" class="logo">
        <img src="/images/favicon-32x32.png" alt="" style="width:28px;height:28px;" />
        <span>OceanSwimmer</span>
    </a>

    <h2>Forgot your password?</h2>
    <p class="subtitle">Enter your email address and we'll send you a link to reset your password.</p>

    <div id="msg" class="msg"></div>

    <form id="forgotForm" onsubmit="handleForgot(event)">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />

        <button type="submit" class="btn-primary" id="submitBtn">Send reset link</button>
    </form>

    <div class="footer-links">
        <a href="/login.html">Back to sign in</a>
    </div>
</div>

<script>
    async function handleForgot(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = 'Sending…';
        clearMsg();

        try {
            const res = await fetch('/auth/forgot-password', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ email: document.getElementById('email').value })
            });

            const data = await res.json();

            if (res.ok) {
                showMsg(data.message, 'success');
                document.getElementById('forgotForm').style.display = 'none';
            } else {
                showMsg(data.error || 'Something went wrong. Please try again.', 'error');
                btn.disabled = false;
                btn.textContent = 'Send reset link';
            }
        } catch {
            showMsg('Something went wrong. Please try again.', 'error');
            btn.disabled = false;
            btn.textContent = 'Send reset link';
        }
    }

    function showMsg(text, type) {
        const el = document.getElementById('msg');
        el.textContent = text;
